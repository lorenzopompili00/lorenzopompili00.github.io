#   editorial : true  -> long-list LIGO-Virgo-KAGRA Editorial Team (star + accent border)
#   authors   : author string; wrap your own name in <strong>...</strong>
#   title     : paper title (use \(...\) for inline math)
#   ref       : journal reference, or status ("Submitted to ...", "Accepted in ...", "In preparation")
#   tag       : journal badge (PRD, PRL, PRX, ApJL, CQG, JCAP, LRR, SoftwareX, SciPost) — leave blank if unpublished
#   arxiv     : arXiv identifier (linked); leave blank if none
#   year      : optional. Entries are grouped by arXiv year automatically; only set
#               this to override the group year for an entry without an arXiv id.
#   doi       : URL of the published version; makes the journal reference a link

